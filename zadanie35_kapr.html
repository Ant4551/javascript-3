<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <title>Zadanie 35 - Kapral</title>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <script language="JavaScript">
        // Antoni Kapral 3F - 2.8.2025
        // Zadanie 35 - Określenie znaku liczby
        
        var x_kap = prompt("podaj liczbę x=","");
        var a_kap = parseFloat(x_kap);
        
        document.write("<div style='color:red;font-size:50px;'>");
        document.write("czytana liczba x=" + a_kap + "<br>");
        
        if(a_kap > 0) {
            document.write("czytana liczba jest większa od 0" + "<br>");
        }
        if(a_kap == 0) {
            document.write("czytana liczba jest równa 0" + "<br>");
        }
        if(a_kap < 0) {
            document.write("czytana liczba jest mniejsza od 0" + "<br>");
        }
        document.write("</div>");
        
        function okno_zamknij_kapral() {
            window.close();
        }
    </script>
</head>
<body>
    <input type="button" value="zamknij okno" onclick="okno_zamknij_kapral()"/>
</body>
</html>
