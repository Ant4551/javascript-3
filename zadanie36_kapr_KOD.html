// Antoni Kapral 3F - 2.8.2025
// Zadanie 36 - Parzysta czy nieparzysta
        
        var x_kap = prompt("podaj liczbę x=","");
        var a_kap = parseFloat(x_kap);
        
        document.write("wczytana liczba x=" + a_kap + "&lt;br&gt;");
        
        if(a_kap % 2 == 0) {
            // parzysta
            document.write("&lt;font color=red size=3&gt;liczba jest parzysta&lt;/font&gt;" + "&lt;br&gt;");
        } else {
            // nieparzysta
            document.write("&lt;font color=silver size=5&gt;liczba jest nieparzysta&lt;/font&gt;" + "&lt;br&gt;");
        }
        
        function okno_zamknij_kapral() {
            window.close();
        }
    </script>
