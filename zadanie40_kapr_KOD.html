    <textarea cols="90" rows="30">
&lt;!DOCTYPE html&gt;
&lt;html lang="pl"&gt;
&lt;head&gt;
    &lt;title&gt;Zadanie 40 - Kapral&lt;/title&gt;
    &lt;meta charset="utf-8"&gt;
    &lt;style&gt;
        h1 { text-transform: uppercase; }
    &lt;/style&gt;
    &lt;script language="JavaScript"&gt;
// Antoni Kapral 3F - 2.8.2025
// Zadanie 40 - Proste działania

function suma_kap() {
    var a_kap = document.getElementById("a_kap").value;
    var b_kap = document.getElementById("b_kap").value;
    
    if (a_kap == "" || b_kap == "") {
        document.getElementById("wynik_kap").innerHTML = "Proszę uzupełnić obie liczby.";
    } else {
        a_kap = parseFloat(a_kap);
        b_kap = parseFloat(b_kap);
        var suma = a_kap + b_kap;
        document.getElementById("wynik_kap").innerHTML = "Wynik działania wynosi: " + suma.toFixed(2);
    }
}

function roznica_kap() {
    var a_kap = document.getElementById("a_kap").value;
    var b_kap = document.getElementById("b_kap").value;
    
    if (a_kap == "" || b_kap == "") {
        document.getElementById("wynik_kap").innerHTML = "Proszę uzupełnić obie liczby.";
    } else {
        a_kap = parseFloat(a_kap);
        b_kap = parseFloat(b_kap);
        var roznica = a_kap - b_kap;
        document.getElementById("wynik_kap").innerHTML = "Wynik działania wynosi: " + roznica.toFixed(2);
    }
}

function iloczyn_kap() {
    var a_kap = document.getElementById("a_kap").value;
    var b_kap = document.getElementById("b_kap").value;
    
    if (a_kap == "" || b_kap == "") {
        document.getElementById("wynik_kap").innerHTML = "Proszę uzupełnić obie liczby.";
    } else {
        a_kap = parseFloat(a_kap);
        b_kap = parseFloat(b_kap);
        var iloczyn = a_kap * b_kap;
        document.getElementById("wynik_kap").innerHTML = "Wynik działania wynosi: " + iloczyn.toFixed(2);
    }
}

function iloraz_kap() {
    var a_kap = document.getElementById("a_kap").value;
    var b_kap = document.getElementById("b_kap").value;
    
    if (a_kap == "" || b_kap == "") {
        document.getElementById("wynik_kap").innerHTML = "Proszę uzupełnić obie liczby.";
    } else {
        a_kap = parseFloat(a_kap);
        b_kap = parseFloat(b_kap);
        
        if (b_kap == 0) {
            document.getElementById("wynik_kap").innerHTML = "Nie wolno dzielić przez zero.";
        } else {
            var iloraz = a_kap / b_kap;
            document.getElementById("wynik_kap").innerHTML = "Wynik działania wynosi: " + iloraz.toFixed(2);
        }
    }
}

function teoria_kap() {
    var teoriaText = "";
    teoriaText += "&lt;div style='background-color:#f0f0f0; padding:15px; margin:10px; border:1px solid black;'&gt;";
    
    // Linia 1
    teoriaText += "&lt;b&gt;Linia 1:&lt;/b&gt; &amp;lt;label for=\"a_kap\"&amp;gt;Podaj pierwszą liczbę:&amp;lt;/label&amp;gt; &amp;lt;input type=\"number\" id=\"a_kap\"&amp;gt;&lt;br&gt;";
    teoriaText += "&lt;b&gt;Wytłumaczenie:&lt;/b&gt; Ta linijka kodu HTML tworzy interfejs użytkownika składający się z etykiety (label) [opis wprowadzania danych, czyli tekst przed polem input] i pola do wprowadzania danych (input) w języku JavaScript (oraz HTML). label i input współpracują między sobą.&lt;br&gt;&lt;br&gt;";
    
    // Linia 2
    teoriaText += "&lt;b&gt;Linia 2:&lt;/b&gt; &amp;lt;input type=\"button\" value=\"DODAWANIE\" onclick=\"suma_kap()\"&amp;gt;&lt;br&gt;";
    teoriaText += "&lt;b&gt;Wytłumaczenie:&lt;/b&gt; Wykonanie przycisku o nazwie DODAWANIE i z takim samym napisem, kliknięcie myszką uruchamia funkcję suma_kap().&lt;br&gt;&lt;br&gt;";
    
    // Linia 3
    teoriaText += "&lt;b&gt;Linia 3:&lt;/b&gt; var a_kap = document.getElementById(\"a_kap\").value;&lt;br&gt;";
    teoriaText += "&lt;b&gt;Wytłumaczenie:&lt;/b&gt; wpisanie do zmiennej \"a_kap\" wartości z elementu o Id \"a_kap\".&lt;br&gt;&lt;br&gt;";
    
    // Linia 4
    teoriaText += "&lt;b&gt;Linia 4:&lt;/b&gt; if (a_kap == \"\" || b_kap == \"\") {&lt;br&gt;";
    teoriaText += "&lt;b&gt;Wytłumaczenie:&lt;/b&gt; sprawdzenie czy pola \"a_kap\" lub \"b_kap\" są puste.&lt;br&gt;&lt;br&gt;";
    
    // Linia 5
    teoriaText += "&lt;b&gt;Linia 5:&lt;/b&gt; document.getElementById(\"wynik_kap\").innerHTML = \"Wynik działania wynosi: \" + suma;&lt;br&gt;";
    teoriaText += "&lt;b&gt;Wytłumaczenie:&lt;/b&gt; pobranie wartości Id o nazwie \"wynik_kap\" i wyprowadzenie w oknie przeglądarki tekstu \"Wynik działania wynosi: \" oraz wartości zmiennej suma;&lt;br&gt;";
    
    teoriaText += "&lt;/div&gt;";
    
    document.getElementById("teoria_kap").innerHTML = teoriaText;
}

function okno_zamknij_kapral() {
    window.close();
}
    &lt;/script&gt;
&lt;/head&gt;
&lt;body&gt;
    &lt;h1&gt;Proste działania&lt;/h1&gt;
    &lt;h2&gt;Antoni Kapral klasa 3F&lt;/h2&gt;
    
    &lt;label for="a_kap"&gt;Podaj pierwszą liczbę:&lt;/label&gt; &lt;input type="number" id="a_kap"&gt;
    &lt;br&gt;&lt;br&gt;
    &lt;label for="b_kap"&gt;Podaj drugą liczbę:&lt;/label&gt; &lt;input type="number" id="b_kap"&gt;
    &lt;br&gt;&lt;br&gt;
    
    &lt;input type="button" value="DODAWANIE" onclick="suma_kap()"&gt;
    &lt;input type="button" value="ODEJMOWANIE" onclick="roznica_kap()"&gt;
    &lt;input type="button" value="MNOŻENIE" onclick="iloczyn_kap()"&gt;
    &lt;input type="button" value="DZIELENIE" onclick="iloraz_kap()"&gt;
    &lt;input type="button" value="TEORIA-Kapral" onclick="teoria_kap()"&gt;
    
    &lt;div id="wynik_kap" style="margin-top:20px; font-size:18px; font-weight:bold;"&gt;&lt;/div&gt;
    &lt;div id="teoria_kap" style="margin-top:20px;"&gt;&lt;/div&gt;
    
    &lt;br&gt;&lt;br&gt;
    &lt;input type="button" value="zamknij okno" onclick="okno_zamknij_kapral()"/&gt;
&lt;/body&gt;
